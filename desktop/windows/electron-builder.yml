appId: com.omiwindows.app
productName: Omi for Windows
directories:
  buildResources: build
files:
  # Explicit default; positive patterns below would otherwise replace it.
  - '**/*'
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  - '!{tailwind.config.ts,postcss.config.js}'
  - '!resources/win-ocr-helper/*.pdb'
  - '!resources/win-automation-helper/*.pdb'
  - '!resources/win-audio-helper/*.pdb'
asarUnpack:
  - resources/**
  # koffi loads its native .node at runtime, resolved relative to its own package
  # dir — it must live outside the asar archive or the foreground monitor fails.
  - node_modules/koffi/**
  # kgWorker.js is loaded via new Worker(path) which bypasses Electron's asar
  # virtual-fs patch — it must be a real file on disk.
  - out/main/kgWorker.js
  # The coding-agent ACP entry is spawned as a plain Node child process
  # (ELECTRON_RUN_AS_NODE), which cannot read scripts out of the asar archive —
  # both the entry (emitted under out/main/chunks by the ?asset import) and the
  # packages it needs at runtime must be real files on disk. The transitive
  # entries are claude-agent-acp's own runtime imports (electron-builder
  # flattens resolved deps into the package's node_modules).
  - out/main/chunks/*.mjs
  - node_modules/@agentclientprotocol/claude-agent-acp/**
  - node_modules/@agentclientprotocol/sdk/**
  - node_modules/@anthropic-ai/claude-agent-sdk/**
  - node_modules/@anthropic-ai/claude-agent-sdk-win32-x64/**
  # zod is the only remaining runtime import of the closure above (verified by
  # spawning the entry from a packaged build; the sdk resolves it hoisted).
  - node_modules/zod/**
  # pi-mono (@earendil-works/pi-coding-agent) is spawned as a plain-Node child
  # (ELECTRON_RUN_AS_NODE) by src/main/codingAgent/piMono.ts, so — like the ACP
  # entry above — every file it require()s at runtime must live outside the asar
  # archive. The four @earendil-works packages are its core; jiti (bundled in its
  # closure) is what loads the .ts provider extension on the fly.
  #
  # ⚠️ INCOMPLETE — DO NOT treat pi-mono as packaged-ready on this alone. pi's
  # full runtime closure is ~145 packages (verified from the installed tree:
  # AWS SDK, google-auth-library, protobufjs, openai, @mistralai/mistralai,
  # @google/genai, jiti, undici, plus the native @mariozechner/clipboard-win32-x64-msvc
  # addon and the @silvia-odwyer/photon-node WASM). Many overlap the app's own
  # deps but STILL need to be on-disk because the plain-Node child cannot read
  # them from asar. The complete asarUnpack list + a packaged-build spawn test
  # must be added BEFORE pi-mono is registered/enabled (tracked for PR-D). This
  # PR lands the adapter DARK; nothing spawns pi yet, so this closure is not
  # exercised in production here.
  - node_modules/@earendil-works/**
win:
  executableName: omi-windows
  # Committed multi-size icon (generated by `pnpm gen:app-icon`). Set explicitly
  # because it lives in resources/, not the default buildResources dir (build/,
  # which is gitignored). NSIS installer/uninstaller/shortcut icons inherit this.
  icon: resources/icon.ico
  target:
    - target: nsis
      arch: [x64]
  # --- CODE SIGNING (Azure Trusted Signing, env-activated) ---
  # Signing is NOT configured statically here on purpose: an always-present
  # azureSignOptions block would make every local `pnpm build:win` attempt to
  # sign and fail when no Azure creds are around. Instead the release workflow
  # (.github/workflows/desktop_windows_release.yml) injects the block ONLY when
  # the Azure Trusted Signing secrets exist, via electron-builder `-c` overrides:
  #
  #   electron-builder --win --x64 \
  #     -c.win.azureSignOptions.publisherName="$AZURE_PUBLISHER_NAME" \
  #     -c.win.azureSignOptions.endpoint="$AZURE_CODE_SIGNING_ENDPOINT" \
  #     -c.win.azureSignOptions.certificateProfileName="$AZURE_CERT_PROFILE_NAME" \
  #     -c.win.azureSignOptions.codeSigningAccountName="$AZURE_CODE_SIGNING_ACCOUNT"
  #
  # Auth comes from AZURE_TENANT_ID / AZURE_CLIENT_ID / AZURE_CLIENT_SECRET in the
  # env (electron-builder + @azure/identity read them). When the secrets are
  # absent the workflow builds unsigned (SmartScreen warns "unknown publisher")
  # and this file stays inert — no behavior change. Full setup + the exact GitHub
  # secret names: desktop/windows/docs/release-pipeline.md.
  #
  # Traditional OV/EV cert alternative (also inject via the workflow, never here):
  # signtoolOptions:
  #   certificateSubjectName: "Based Hardware"   # EV cert in the machine store
  #   # or: certificateFile / certificatePassword via CSC_LINK / CSC_KEY_PASSWORD env
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  # No spaces in the installer filename: electron-updater downloads by the exact
  # `url` in latest.yml, and the release workflow uploads assets by their on-disk
  # name via `gh`. A spaced name (from productName) sanitizes to a different url
  # in latest.yml than the uploaded asset -> auto-update 404s. Keep them identical.
  artifactName: Omi-for-Windows-Setup-${version}.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
mac:
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSCameraUsageDescription: Application requests access to the device's camera.
    - NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  notarize: false
dmg:
  artifactName: ${name}-${version}.${ext}
linux:
  target:
    - AppImage
    - snap
    - deb
  maintainer: Based Hardware <team@basedhardware.com>
  category: Utility
appImage:
  artifactName: ${name}-${version}.${ext}
npmRebuild: false

# --- AUTO-UPDATE ---
# electron-updater is wired in src/main/updater.ts (packaged builds only; silent
# download + install-on-next-quit; NSIS differential updates stay default-on).
# This is the UPDATE FEED only; the release workflow publishes with `gh` (not
# electron-builder's uploader), so the owner/repo here must match where the
# workflow lands releases — desktop_windows_release.yml publishes to the repo it
# runs in (BasedHardware/omi in production), so they align.
# releaseType 'release' means only non-prerelease GitHub releases are served as
# updates: the workflow's betas are prereleases, so they are NOT auto-pushed to
# installed apps (download manually), mirroring the macOS beta/stable split —
# a stable-promotion step (flip prerelease -> false) is what makes a build
# auto-update. Local testing uses dev-app-update.yml + OMI_UPDATER_DEV=1.
publish:
  - provider: github
    owner: BasedHardware
    repo: omi
    releaseType: release
